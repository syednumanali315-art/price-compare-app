version: "3.8"

services:
  # ─── Nginx Reverse Proxy ──────────────────────────────────────
  nginx:
    build: ./nginx
    container_name: pricecomparehub-nginx
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - app-network

  # ─── React Frontend ───────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: pricecomparehub-frontend
    environment:
      - REACT_APP_API_URL=/api
    restart: unless-stopped
    networks:
      - app-network

  # ─── Node.js Backend ──────────────────────────────────────────
  backend:
    build: ./backend
    container_name: pricecomparehub-backend
    environment:
      - NODE_ENV=production
      - PORT=5000
      - AWS_REGION=${AWS_REGION:-ap-south-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - DYNAMODB_TABLE_NAME=${DYNAMODB_TABLE_NAME:-Products}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-pricecomparehub-images}
      - SNS_TOPIC_ARN=${SNS_TOPIC_ARN}
      - FRONTEND_URL=http://localhost
    volumes:
      - backend-logs:/app/logs
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  backend-logs:

networks:
  app-network:
    driver: bridge
